name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS-arm64
            os: macos-14
            target: aarch64-apple-darwin
            suffix: ""
          - name: macOS-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            suffix: ""
          - name: Linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            suffix: ""
          - name: Linux-x86_64-cuda
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            suffix: -cuda
            cuda: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake libclang-dev pkg-config libssl-dev

      - name: Install CUDA toolkit
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: "12.6.3"
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev"]'

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake openssl@3

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}${{ matrix.suffix }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}${{ matrix.suffix }}-cargo-release-

      - name: Build release binary
        env:
          GGML_CUDA: ${{ matrix.cuda && 'ON' || '' }}
        run: cargo build --release --features llama-native -p autocommit-cli --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          SUFFIX="${{ matrix.suffix }}"
          ARCHIVE="autocommit-${VERSION}-${TARGET}${SUFFIX}.tar.gz"

          mkdir staging
          cp "target/${{ matrix.target }}/release/autocommit" staging/
          tar czf "${ARCHIVE}" -C staging autocommit
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"

          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: autocommit-${{ matrix.target }}${{ matrix.suffix }}
          path: |
            autocommit-*.tar.gz
            autocommit-*.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -la autocommit-*

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            autocommit-*.tar.gz
            autocommit-*.tar.gz.sha256
